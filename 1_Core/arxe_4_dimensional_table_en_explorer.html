<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArXe — Ontological Hierarchy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07080a;
  --surface: #0e1016;
  --border: rgba(255,255,255,0.07);
  --text: #d8d4cc;
  --dim: #5a5650;
  --bright: #eee9e0;

  --closed: #4a9eff;
  --open: #ff6b35;
  --prime: #a8e063;
  --zero: #cc88ff;

  --font-serif: 'Libre Baskerville', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  padding: 2.5rem 3rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 2rem;
  flex-wrap: wrap;
}
.logo {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-style: italic;
  color: var(--bright);
  letter-spacing: -0.02em;
}
.logo span { color: var(--open); font-style: normal; }
.tagline {
  font-size: 0.68rem;
  color: var(--dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* ── LAYOUT ── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 80px);
}

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  position: sticky;
  top: 0;
  height: calc(100vh - 80px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-label {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--dim);
  text-transform: uppercase;
  padding: 0 1.5rem;
  margin-bottom: 1rem;
}

.level-btn {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  width: 100%;
  padding: 0.7rem 1.5rem;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s ease;
  color: var(--dim);
}
.level-btn:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.level-btn.active {
  border-left-color: currentColor;
  background: rgba(255,255,255,0.04);
  color: var(--bright);
}

.level-btn .tk {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 0.95rem;
  min-width: 40px;
}
.level-btn .info { display: flex; flex-direction: column; gap: 0.1rem; }
.level-btn .term { font-size: 0.72rem; letter-spacing: 0.05em; }
.level-btn .physics-tag { font-size: 0.6rem; color: var(--dim); opacity: 0.7; }
.level-btn.active .physics-tag { opacity: 1; }

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: auto;
}

/* ── MAIN PANEL ── */
.main {
  padding: 2.5rem 3rem;
  overflow-y: auto;
}

/* ── LEVEL DISPLAY ── */
.level-display { display: none; animation: fadeIn 0.35s ease; }
.level-display.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.level-header {
  display: flex;
  align-items: flex-start;
  gap: 2rem;
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.level-symbol {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(3.5rem, 8vw, 5.5rem);
  line-height: 1;
  color: var(--bright);
  flex-shrink: 0;
}

.level-meta { flex: 1; min-width: 200px; }
.level-meta h1 {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--bright);
  margin-bottom: 0.4rem;
  font-style: italic;
}
.level-meta .problem-text {
  font-size: 0.8rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.level-meta .arxe-term {
  display: inline-block;
  border: 1px solid var(--border);
  padding: 0.2rem 0.7rem;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--open);
  text-transform: uppercase;
}

/* BADGE ROW */
.badges {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.8rem;
  flex-wrap: wrap;
}
.badge {
  padding: 0.2rem 0.65rem;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid;
}
.badge-bc-closed { color: var(--closed); border-color: rgba(74,158,255,0.3); background: rgba(74,158,255,0.06); }
.badge-bc-open   { color: var(--open);   border-color: rgba(255,107,53,0.3);  background: rgba(255,107,53,0.06); }
.badge-bc-both   { color: var(--prime);  border-color: rgba(168,224,99,0.3);  background: rgba(168,224,99,0.06); }
.badge-bc-zero   { color: var(--zero);   border-color: rgba(204,136,255,0.3); background: rgba(204,136,255,0.06); }
.badge-prime     { color: var(--prime);  border-color: rgba(168,224,99,0.3);  background: rgba(168,224,99,0.06); }
.badge-neutral   { color: var(--dim);    border-color: var(--border); }

/* GRID OF PROPERTIES */
.prop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1px;
  background: var(--border);
  margin-bottom: 2rem;
}
.prop {
  background: var(--surface);
  padding: 1.2rem 1.4rem;
}
.prop-label {
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.prop-value {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--bright);
  line-height: 1.35;
}
.prop-value.mono {
  font-family: var(--font-mono);
  font-size: 0.82rem;
}

/* DESCRIPTION BLOCK */
.desc-block {
  border-left: 2px solid var(--border);
  padding-left: 1.5rem;
  margin-bottom: 2rem;
}
.desc-block p {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 0.8rem;
}

/* PATTERN SECTION */
.pattern-section {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.pattern-section h3 {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.pattern-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.78rem;
}
.pattern-key { color: var(--dim); min-width: 90px; font-size: 0.65rem; letter-spacing: 0.1em; }
.pattern-val { color: var(--text); font-family: var(--font-serif); }
.pattern-val em { font-style: italic; color: var(--bright); }

/* VISUAL GEOMETRY */
.geo-canvas {
  margin: 2rem 0;
  display: flex;
  align-items: center;
  gap: 2rem;
  flex-wrap: wrap;
}
.geo-canvas canvas {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
}
.geo-info { flex: 1; min-width: 180px; }
.geo-info h4 {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.geo-info p {
  font-family: var(--font-serif);
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.7;
}

/* ── OVERVIEW MODE ── */
.overview { display: none; }
.overview.active { display: block; }

.ov-title {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1.6rem;
  color: var(--bright);
  margin-bottom: 0.5rem;
}
.ov-sub {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

.ov-table { width: 100%; border-collapse: collapse; }
.ov-table th {
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
  text-align: left;
  padding: 0.5rem 0.8rem;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.ov-table td {
  padding: 0.65rem 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.78rem;
  vertical-align: middle;
  cursor: pointer;
}
.ov-table tr:hover td { background: rgba(255,255,255,0.025); }
.ov-table .col-tk { font-family: var(--font-serif); font-style: italic; font-size: 1rem; color: var(--bright); }
.ov-table .col-problem { font-family: var(--font-serif); color: var(--text); }
.ov-table .col-physics { color: var(--dim); font-size: 0.72rem; }
.ov-table .col-term { color: var(--open); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }
.ov-table .col-bc span { font-size: 0.6rem; }

/* PATTERNS OVERVIEW */
.ov-patterns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1px;
  background: var(--border);
  margin-top: 2.5rem;
}
.ov-pattern-card {
  background: var(--surface);
  padding: 1.5rem;
}
.ov-pattern-card h4 {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.ov-pattern-card p {
  font-family: var(--font-serif);
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.7;
}
.ov-pattern-card .highlight { color: var(--prime); }

/* SCROLL */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* MOBILE */
@media (max-width: 700px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; padding: 0.5rem; gap: 0.3rem; }
  .sidebar-label { display: none; }
  .level-btn { width: auto; padding: 0.4rem 0.8rem; border-left: none; border-bottom: 2px solid transparent; }
  .level-btn .info .physics-tag { display: none; }
  .dot { display: none; }
  header { padding: 1.5rem; }
  .main { padding: 1.5rem; }
}
</style>

// ─── UTILITIES ────────────────────────────────────────

function getBCBadge(bc) {
  const { closed, open } = bc;
  if (closed === 0 && open === 0) return { cls: 'badge-bc-zero', label: 'BC 0/0 · Foundation' };
  if (open === 0) return { cls: 'badge-bc-closed', label: `BC ${closed}/0 · Closed` };
  if (closed === 0) return { cls: 'badge-bc-open', label: `BC 0/${open} · Open` };
  return { cls: 'badge-bc-both', label: `BC ${closed}/${open} · Mixed` };
}

function drawGeometry(canvas, sides, color) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.38;

  ctx.strokeStyle = color;
  ctx.fillStyle = color + '12';
  ctx.lineWidth = 1.5;

  if (sides === 0) {
    // Point + radiating lines
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      ctx.beginPath();
      ctx.strokeStyle = color + '30';
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * R * 0.6, cy + Math.sin(a) * R * 0.6);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    return;
  }

  if (sides === 2) {
    // Line segment
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.moveTo(cx - R, cy);
    ctx.lineTo(cx + R, cy);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(cx - R, cy, 4, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
    ctx.beginPath(); ctx.arc(cx + R, cy, 4, 0, Math.PI*2); ctx.fill();
    return;
  }

  // Regular polygon
  const offset = -Math.PI / 2;
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = offset + (i / sides) * Math.PI * 2;
    const x = cx + Math.cos(a) * R;
    const y = cy + Math.sin(a) * R;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = color + '10';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();

  // Diagonals (subtle)
  ctx.strokeStyle = color + '18';
  ctx.lineWidth = 0.5;
  const verts = [];
  for (let i = 0; i < sides; i++) {
    const a = offset + (i / sides) * Math.PI * 2;
    verts.push([cx + Math.cos(a) * R, cy + Math.sin(a) * R]);
  }
  for (let i = 0; i < verts.length; i++) {
    for (let j = i + 2; j < verts.length - (i === 0 ? 1 : 0); j++) {
      ctx.beginPath();
      ctx.moveTo(verts[i][0], verts[i][1]);
      ctx.lineTo(verts[j][0], verts[j][1]);
      ctx.stroke();
    }
  }
}

  btn.dataset.id = lvl.id;

  const kType = lvl.k === null ? 'neutral' : lvl.k > 0 ? 'closed' : lvl.k === 0 ? 'zero' : 'open';
  const dotColor = { closed: 'var(--closed)', open: 'var(--open)', zero: 'var(--zero)', neutral: 'var(--dim)' }[kType];

  btn.innerHTML = `
    <span class="tk">${lvl.tk}</span>
    <span class="info">
      <span class="term">${lvl.term}</span>
      <span class="physics-tag">${lvl.physics}</span>
    </span>
    <span class="dot" style="background:${dotColor}"></span>
  `;
  btn.addEventListener('click', () => showLevel(lvl.id));
  sidebar.appendChild(btn);
});

        </div>

        </div>
        <div class="prop">
          <div class="prop-label">Probability</div>
          <div class="prop-value mono">${lvl.probability}</div>
        </div>
        <div class="prop">
          <div class="prop-label">Philosophy</div>
          <div class="prop-value">${lvl.philosophy}</div>
        </div>
      </div>

      <div class="geo-canvas">
        <canvas id="canvas-${lvl.id}" width="180" height="180"></canvas>
        <div class="geo-info">

        <div class="pattern-row"><span class="pattern-key">ArXe term</span><span class="pattern-val"><em>${lvl.term}</em></span></div>
      </div>
    </div>
  `;
}

const main = document.getElementById('main');
main.innerHTML = buildOverview();
LEVELS.filter(l => l.id !== 'overview').forEach(lvl => {
  main.innerHTML += buildLevel(lvl);
});

// Click on overview table rows
main.querySelectorAll('.ov-table tr[data-id]').forEach(tr => {
  tr.addEventListener('click', () => showLevel(tr.dataset.id));
});

function showLevel(id) {
  // Sidebar buttons
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  // Panels
  document.querySelectorAll('.level-display, .overview').forEach(p => {
    p.classList.remove('active');
  });
  const panel = document.getElementById('panel-' + id);
  if (panel) {
    panel.classList.add('active');
    // Draw geometry
    const lvl = LEVELS.find(l => l.id === id);
    if (lvl) {
      requestAnimationFrame(() => {
        const canvas = document.getElementById('canvas-' + id);
        if (canvas) drawGeometry(canvas, lvl.sides, lvl.color);
      });
    }
  }
  main.scrollTo({ top: 0, behavior: 'smooth' });
}

// Draw overview on load
showLevel('overview');
